## \u52A0\u5BC6\u54CD\u5E94\u8DEF\u5F84
hnyr.encrypt.uri=
## \u5FFD\u7565\u6743\u9650\u62E6\u622A\u8DEF\u5F84
hnyr.exclude.path=/api/sys/file/common/image/**,/api/wap/sys/file/common/image/**
## \u5FFD\u7565xss\u3001sql\u62E6\u622A\u8DEF\u5F84\uFF08\u4E3B\u8981\u5BF9\u5BCC\u6587\u672C\u3001\u7B54\u9898\u4E2D\u5B58\u5728\u7279\u6B8A\u5B57\u7B26\u7684 \u8DF3\u51FA\u7EDF\u4E00\u62E6\u622A\uFF0C\u4F46\u5BF9\u5E94\u63A5\u53E3\u5E94\u5355\u72EC\u5904\u7406\u907F\u514D xss/sql \u6CE8\u5165\u95EE\u9898\uFF09
hnyr.exclude.xql=/api/sys/rbac/data-purview/define/save
## \u8FDE\u7EED\u767B\u5F55\u5931\u8D25\u6B21\u6570\u9650\u5236
